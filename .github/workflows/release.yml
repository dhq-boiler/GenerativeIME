# Release pipeline: every push to main builds a version-bumped WPF
# installer exe and publishes it as a GitHub Release. Release notes are
# hand-assembled from git log (--generate-notes only lists PRs, which is
# empty under this repo's direct-push-to-main flow).
#
# Versioning: latest v* tag's patch + 1. Before the first release tag
# exists, the fallback comes from the <Version> element in
# GenerativeIME.Installer.csproj + 1.
name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'corpus/**'
      - '.gitignore'

permissions:
  contents: write

# A release creates a tag; never let two runs race for the same number.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history: tags for versioning, commits for notes

      - name: Compute next version
        id: ver
        shell: pwsh
        run: |
          $latest = git tag --list 'v*' --sort=-v:refname | Select-Object -First 1
          if ($latest -and $latest -match '^v(\d+)\.(\d+)\.(\d+)$') {
            $ver = "$($Matches[1]).$($Matches[2]).$([int]$Matches[3] + 1)"
          } else {
            $csproj = Get-Content src/GenerativeIME.Installer/GenerativeIME.Installer.csproj -Raw
            if ($csproj -notmatch "InstallerVersion\)' == ''\s*"">(\d+)\.(\d+)\.(\d+)<") {
              throw 'version fallback not found in installer csproj'
            }
            $ver = "$($Matches[1]).$($Matches[2]).$([int]$Matches[3] + 1)"
          }
          "version=$ver" >> $env:GITHUB_OUTPUT
          "prev_tag=$latest" >> $env:GITHUB_OUTPUT
          Write-Host "Next version: v$ver (previous tag: $latest)"

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache vcpkg (mecab)
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
          key: vcpkg-mecab-x64-windows-v1

      - name: Install MeCab via vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path 'C:\vcpkg\installed\x64-windows\lib\mecab.lib')) {
            vcpkg install mecab:x64-windows
            if ($LASTEXITCODE -ne 0) { throw 'vcpkg install failed' }
          } else {
            Write-Host 'mecab already in cache'
          }

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch UniDic-Lite dictionary
        shell: pwsh
        run: |
          python -m pip install --quiet unidic-lite
          ./scripts/setup-mecab-dict.ps1

      - name: Build installer
        shell: pwsh
        env:
          VcpkgRoot: C:\vcpkg
        run: ./installer/build_installer.ps1 -Version '${{ steps.ver.outputs.version }}'

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ver  = '${{ steps.ver.outputs.version }}'
          $prev = '${{ steps.ver.outputs.prev_tag }}'
          $range = if ($prev) { "$prev..HEAD" } else { 'HEAD' }
          $lines = @('## 変更点', '')
          $lines += git log $range --no-merges --format='- %s (%h)'
          if ($prev) {
            $lines += @('', "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$prev...v$ver")
          }
          Set-Content -Path notes.md -Value ($lines -join "`n") -Encoding utf8
          Get-Content notes.md | Write-Host
          gh release create "v$ver" `
            installer/build/GenerativeImeInstaller.exe `
            --title "GenerativeIME v$ver" `
            --target $env:GITHUB_SHA `
            --notes-file notes.md
          if ($LASTEXITCODE -ne 0) { throw 'gh release create failed' }
